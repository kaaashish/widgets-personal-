<!DOCTYPE html>
<html>
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #ffffff;
        font-family: 'Press Start 2P', monospace;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        border: 3px solid #a8d8ea;
        border-radius: 16px;
        box-shadow: 0 0 0 3px #ffb6c1, 0 8px 24px rgba(168, 216, 234, 0.3);
      }

      .titlebar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: #a8d8ea;
        border-radius: 13px 13px 0 0;
        -webkit-app-region: drag;
        flex-shrink: 0;
      }

      .title {
        color: #ffffff;
        font-size: 7px;
        text-shadow: 1px 1px #7ab8d0;
      }

      .buttons {
        display: flex;
        gap: 5px;
        -webkit-app-region: no-drag;
      }

      .btn {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
      }

      .close { background: #ff6b8a; }
      .minimise { background: #ffb6c1; }
      .btn:hover { opacity: 0.7; }

      .cinn-area {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 8px 0 4px;
        background: #ffffff;
        flex-shrink: 0;
        position: relative;
        height: 80px;
      }

      .cinn-gif {
        height: 70px;
        image-rendering: pixelated;
        transition: opacity 0.2s;
      }

      .day-bar-area {
        padding: 6px 14px 4px;
        background: #ffffff;
        flex-shrink: 0;
      }

      .bar-label {
        display: flex;
        justify-content: space-between;
        color: #a8d8ea;
        font-size: 6px;
        margin-bottom: 4px;
      }

      .bar-container {
        width: 100%;
        height: 8px;
        background: #f0f8ff;
        border: 2px solid #a8d8ea;
        border-radius: 0;
        overflow: hidden;
        image-rendering: pixelated;
      }

      .day-bar {
        height: 100%;
        background: repeating-linear-gradient(
          90deg,
          #a8d8ea 0px, #a8d8ea 6px,
          #c8eaf8 6px, #c8eaf8 8px
        );
        transition: width 1s ease;
      }

      .task-bar-area {
        padding: 4px 14px 6px;
        background: #ffffff;
        border-bottom: 2px solid #ffb6c1;
        flex-shrink: 0;
      }

      .task-bar {
        height: 100%;
        background: repeating-linear-gradient(
          90deg,
          #ffb6c1 0px, #ffb6c1 6px,
          #ffd6e0 6px, #ffd6e0 8px
        );
        transition: width 0.5s ease;
      }

      .tasks {
        flex: 1;
        overflow-y: auto;
        padding: 8px 14px;
        background: #ffffff;
      }

      .tasks::-webkit-scrollbar { width: 4px; }
      .tasks::-webkit-scrollbar-thumb { background: #a8d8ea; border-radius: 2px; }
      .tasks::-webkit-scrollbar-track { background: transparent; }

      .task {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 0;
        border-bottom: 1px solid #f0f0f0;
        animation: fadein 0.3s ease;
      }

      @keyframes fadein {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .task input[type="checkbox"] {
        appearance: none;
        width: 14px;
        height: 14px;
        border: 2px solid #a8d8ea;
        cursor: pointer;
        flex-shrink: 0;
        background: #ffffff;
        image-rendering: pixelated;
      }

      .task input[type="checkbox"]:checked {
        background: #a8d8ea;
      }

      .task input[type="checkbox"]:checked::after {
        content: '✓';
        display: block;
        text-align: center;
        color: #ffffff;
        font-size: 9px;
        line-height: 12px;
      }

      .task-text {
        flex: 1;
        color: #5a5a7a;
        font-size: 7px;
        line-height: 1.6;
      }

      .task-text.done {
        text-decoration: line-through;
        color: #c0c0d0;
      }

      .task-delete {
        color: #ffb6c1;
        cursor: pointer;
        font-size: 8px;
        background: none;
        border: none;
        font-family: 'Press Start 2P', monospace;
      }

      .task-delete:hover { color: #ff6b8a; }

      .empty {
        text-align: center;
        color: #c0d8e8;
        font-size: 7px;
        margin-top: 20px;
        line-height: 2;
      }

      .add-area {
        padding: 8px 14px;
        background: #f8fbff;
        border-top: 2px solid #a8d8ea;
        border-radius: 0 0 13px 13px;
        flex-shrink: 0;
        display: flex;
        gap: 6px;
      }

      .add-area input {
        flex: 1;
        background: #ffffff;
        border: 2px solid #a8d8ea;
        padding: 5px 8px;
        font-size: 7px;
        font-family: 'Press Start 2P', monospace;
        color: #5a5a7a;
        outline: none;
      }

      .add-area input::placeholder { color: #c0d8e8; }
      .add-area input:focus { border-color: #ffb6c1; }

      .add-btn {
        background: #ffb6c1;
        border: 2px solid #ff6b8a;
        padding: 5px 10px;
        color: #ffffff;
        font-size: 7px;
        font-family: 'Press Start 2P', monospace;
        cursor: pointer;
      }

      .add-btn:hover { background: #ff6b8a; }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <span class="title">✦ cinn's to-do ✦</span>
      <div class="buttons">
        <button class="btn minimise" onclick="window.electronAPI.minimize()"></button>
        <button class="btn close" onclick="window.electronAPI.close()"></button>
      </div>
    </div>

    <div class="cinn-area">
      <img class="cinn-gif" id="cinnGif" src="joy cinn.gif" />
    </div>

    <div class="day-bar-area">
      <div class="bar-label">
        <span>🌤 day progress</span>
        <span id="dayPercent">0%</span>
      </div>
      <div class="bar-container">
        <div class="day-bar" id="dayBar" style="width:0%"></div>
      </div>
    </div>

    <div class="task-bar-area">
      <div class="bar-label">
        <span>🩵 tasks done</span>
        <span id="taskPercent">0 / 0</span>
      </div>
      <div class="bar-container">
        <div class="task-bar" id="taskBar" style="width:0%"></div>
      </div>
    </div>

    <div class="tasks" id="taskList"></div>

    <div class="add-area">
      <input type="text" id="taskInput" placeholder="what's next..." />
      <button class="add-btn" onclick="addTask()">+ add</button>
    </div>

    <script>
      let data = { tasks: [] }
      let cinnTimeout = null

      function setCinn(gif) {
        const el = document.getElementById('cinnGif')
        el.src = gif
        if (cinnTimeout) clearTimeout(cinnTimeout)
        if (gif !== 'joy cinn.gif') {
          cinnTimeout = setTimeout(() => {
            el.src = 'joy cinn.gif'
          }, 2500)
        }
      }

      async function init() {
        data = await window.electronAPI.loadData()
        renderTasks()
        updateDayBar()
        setInterval(updateDayBar, 60000)
      }

      function updateDayBar() {
        const now = new Date()
        const secondsInDay = 24 * 60 * 60
        const secondsPassed = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()
        const percent = Math.floor((secondsPassed / secondsInDay) * 100)
        document.getElementById('dayBar').style.width = `${percent}%`
        document.getElementById('dayPercent').textContent = `${percent}%`
      }

      function updateTaskBar() {
        const total = data.tasks.length
        const done = data.tasks.filter(t => t.done).length
        const percent = total === 0 ? 0 : Math.floor((done / total) * 100)
        document.getElementById('taskBar').style.width = `${percent}%`
        document.getElementById('taskPercent').textContent = `${done} / ${total}`
      }

      function renderTasks() {
        const list = document.getElementById('taskList')
        list.innerHTML = ''

        if (data.tasks.length === 0) {
          list.innerHTML = '<p class="empty">no tasks yet! 🩵<br/>add something above</p>'
          updateTaskBar()
          return
        }

        data.tasks.forEach((task, i) => {
          const div = document.createElement('div')
          div.classList.add('task')

          const check = document.createElement('input')
          check.type = 'checkbox'
          check.checked = task.done
          check.addEventListener('change', () => toggleTask(i))

          const text = document.createElement('span')
          text.classList.add('task-text')
          if (task.done) text.classList.add('done')
          text.textContent = task.text

          const del = document.createElement('button')
          del.classList.add('task-delete')
          del.textContent = '✕'
          del.addEventListener('click', () => deleteTask(i))

          div.appendChild(check)
          div.appendChild(text)
          div.appendChild(del)
          list.appendChild(div)
        })

        updateTaskBar()
      }

      async function addTask() {
        const input = document.getElementById('taskInput')
        const text = input.value.trim()
        if (!text) return
        data.tasks.push({ text, done: false })
        input.value = ''
        setCinn('question.gif')
        await window.electronAPI.saveData(data)
        renderTasks()
      }

      async function toggleTask(i) {
        data.tasks[i].done = !data.tasks[i].done
        if (data.tasks[i].done) setCinn('task complete.gif')
        await window.electronAPI.saveData(data)
        renderTasks()
      }

      async function deleteTask(i) {
        data.tasks.splice(i, 1)
        await window.electronAPI.saveData(data)
        renderTasks()
      }

      document.getElementById('taskInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addTask()
      })

      init()
    </script>
  </body>
</html>
